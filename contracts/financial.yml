# fewwords Contract Pack: Financial Agents
# For: Trading bots, robo-advisors, payment agents, lending
#      agents, expense management, invoice processing
#
# Compliance: SOX, FINRA, KYC/AML, PCI-DSS
#
# The workflow grit: dual-control requirements, transaction
# limits, audit trail mandates, real-time fraud checks,
# settlement timing rules.
#
# Usage:
#   fewwords run agent_trace.json --config contracts/financial.yml

# --- Safety rails ---
banned_tools:
  - margin_trade             # no leveraged trading without explicit approval
  - short_sell               # restricted strategy
  - wire_transfer_international  # high-risk, needs manual approval
  - override_fraud_check     # never bypass fraud detection
  - delete_transaction       # SOX: transactions are immutable

# --- Required workflow steps ---
required_tools:
  - verify_identity          # KYC: always verify before transactions
  - check_balance            # always verify funds before executing

# --- Budget controls ---
cost_budget_usd: 1.00
max_retries: 2

# --- Schema expectations ---
schemas:
  get_quote:
    type: object
    required: [symbol, price]
    properties:
      symbol:
        type: string
      price:
        type: number
  place_order:
    type: object
    required: [order_id, status]
    properties:
      order_id:
        type: string
      status:
        type: string
  check_balance:
    type: object
    required: [balance]
    properties:
      balance:
        type: number

# --- Behavioral contracts ---
contracts:
  - verify_identity before place_order
  - check_balance before place_order
  - get_quote before place_order
  - never call margin_trade
  - never call override_fraud_check
  - never call delete_transaction
  - whenever place_order then send_confirmation

# --- Conditional gates ---
gates:
  - tool: check_balance
    key: balance
    block_value: 0
    blocked: place_order
  - tool: check_compliance
    key: compliant
    block_value: false
    blocked: place_order

# --- Analysis ---
intent: true
cascade: true
fault_test: true
