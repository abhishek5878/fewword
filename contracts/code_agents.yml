# fewwords Contract Pack: Code Agents
# For: Replit, Cursor, Claude Code, Codex, Devin-style agents
#
# Prevents the incidents that actually happened:
#   - Replit DROP DATABASE (Jul 2025)
#   - Amazon Kiro production env deletion (Dec 2025)
#   - Infinite retry loops on hallucinated tools
#
# Usage:
#   fewwords run agent_trace.json --config contracts/code_agents.yml

# --- Safety rails ---
banned_tools:
  - "*drop*"           # drop_database, drop_table, drop_collection
  - "*truncate*"       # truncate_table, truncate_collection
  - "*rm_rf*"          # rm_rf, rm_rf_recursive
  - "*delete_env*"     # delete_environment, delete_env
  - "*destroy*"        # destroy_stack, destroy_cluster
  - "*format_disk*"

# --- Required workflow steps ---
required_tools:
  - read_file       # always read before editing

# --- Budget controls ---
cost_budget_usd: 5.00
max_retries: 3

# --- Schema expectations ---
schemas:
  read_file:
    type: object
    required: [content]
    properties:
      content:
        type: string
  run_tests:
    type: object
    required: [passed, failed]
    properties:
      passed:
        type: integer
      failed:
        type: integer
  edit_file:
    type: object
    required: [status]

# --- Behavioral contracts ---
contracts:
  - read_file before edit_file
  - never call drop_database
  - never call drop_table
  - never call rm_rf

# --- Analysis ---
intent: true
cascade: true
fault_test: true
