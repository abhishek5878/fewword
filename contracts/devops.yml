# fewwords Contract Pack: DevOps Agents
# For: Kiro-style infra agents, AWS CDK / Terraform CDK bots,
#      ChatOps deployment agents, k8s autopilot tools, IaC
#      copilots, oncall-runbook automation
#
# Prevents the incidents that actually happened:
#   - Amazon Kiro deleted a production AWS environment (Dec 2025)
#   - Replit DROP DATABASE on prod (Jul 2025)
#   - Force-push to main branch wiping committed work
#   - Apply without plan / dry-run review
#   - Agent reads prod credentials and pipes them anywhere
#
# Usage:
#   fewwords run devops_trace.json --config contracts/devops.yml

# --- Safety rails ---
banned_tools:
  # Destructive infrastructure
  - "*destroy*"               # destroy_stack, destroy_cluster, terraform_destroy
  - "*delete_environment*"
  - "*delete_namespace*"
  - "*delete_production*"
  - "*drop_database*"
  - "*truncate*"
  # Destructive git
  - "force_push"
  - "git_force_push"
  - "branch_delete_force"
  # Credential mishandling
  - "read_prod_secret"
  - "dump_credentials"

# --- Required workflow steps ---
required_tools:
  - plan                       # plan / dry-run before any apply

# --- HITL confirmation ---
# Production-modifying actions need an explicit (yes) before fire.
# Mirrors the SRE convention of "two-person rule" for prod changes.
strict_consent_only: true
require_user_consent_before:
  - apply
  - terraform_apply
  - kubectl_apply
  - cdk_deploy
  - merge_to_main
  - push_to_main
  - rotate_credentials
  - scale_replicas
  - cordon_node
  - drain_node

# --- Retry / repetition controls ---
max_retries: 2                 # devops mistakes are expensive, fail loud
max_tool_repeat: 3
stop_on_error: true            # never apply over a failed plan

# --- Cost guardrails ---
cost_budget_usd: 10.00         # cap LLM cost per session

# --- Schema expectations ---
schemas:
  plan:
    type: object
    required: [resources_to_change, summary]
    properties:
      summary:
        type: string
  apply:
    type: object
    required: [status]
    properties:
      status:
        type: string
  deploy:
    type: object
    required: [environment, status]

# --- Behavioral contracts ---
contracts:
  - plan before apply                  # never apply without a plan first
  - plan before terraform_apply
  - plan before kubectl_apply
  - plan before cdk_deploy
  - get_branch_status before merge_to_main
  - never call destroy_stack
  - never call destroy_cluster
  - never call delete_production
  - never call force_push
  - never call dump_credentials

# --- Analysis ---
intent: true
cascade: true
fault_test: true
